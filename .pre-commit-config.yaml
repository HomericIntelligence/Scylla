# Pre-commit hooks for Scylla
# See https://pre-commit.com for more information

# Install both pre-commit and commit-msg hook types when contributors run
# `pre-commit install`, so the conventional-commit validator below is
# activated automatically.
default_install_hook_types: [pre-commit, commit-msg]

repos:

  # Secrets scanning — detect credentials committed to git history
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Silent-failure suppression guards (see HomericIntelligence/Odysseus#280)
  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true
      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

  # Security checks
  - repo: local
    hooks:
      - id: bandit-security-scan
        name: Bandit Security Scan
        description: >-
          AST-based Python security scanning. Replaces the naive pygrep shell=True
          check with bandit which understands code context (skips comments/strings).
          Medium+ severity only (-ll) to avoid low-severity noise.
        entry: pixi run --environment lint bandit
        language: system
        args: [-c, pyproject.toml, --severity-level, medium]
        files: ^(scripts|src/scylla)/.*\.py$
        types: [python]
        pass_filenames: true
      - id: check-mojo-artifacts
        name: Check for Mojo Migration Artifacts
        description: >-
          Fail if src/scylla/ contains Mojo migration artifact phrases
          ('Mojo equivalents' or 'no Mojo') left over from a prior migration attempt.
        entry: '(Mojo equivalents|no Mojo)'
        language: pygrep
        files: ^src/scylla/.*\.py$
        types: [python]
      - id: pip-audit
        name: pip-audit CVE Scan
        entry: pixi run audit
        language: system
        files: ^(pyproject\.toml|pixi\.toml|pixi\.lock)$
        pass_filenames: false
      - id: check-pixi-lock
        name: Check pixi.lock is up-to-date
        entry: pixi install --locked
        language: system
        files: ^(pyproject\.toml|pixi\.toml|pixi\.lock)$
        pass_filenames: false
      - id: check-version-consistency
        name: Check pyproject.toml/pixi.toml Version Consistency
        description: Fails if pyproject.toml and pixi.toml package versions differ
        entry: pixi run python scripts/check_version_consistency.py
        language: system
        files: ^(pyproject\.toml|pixi\.toml)$
        pass_filenames: false
      - id: check-ci-version-sync
        name: Check CI Tooling Version Sync
        description: Fails if pixi, setup-pixi action SHA, or gitleaks versions drift across config files
        entry: pixi run python scripts/check_ci_version_sync.py
        language: system
        files: ^(\.github/pixi-version|\.github/workflows/.*\.ya?ml|\.github/actions/.*/action\.ya?ml|ci/Containerfile|\.pre-commit-config\.yaml)$
        pass_filenames: false

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files in scripts/, src/scylla/, tests/, and all subdirectories using pixi run ruff format
        entry: pixi run ruff format scripts/ src/scylla/ tests/
        language: system
        files: ^(scripts|src/scylla|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files in scripts/, src/scylla/, tests/, and all subdirectories using pixi run ruff check
        entry: pixi run ruff check --fix scripts/ src/scylla/ tests/
        language: system
        files: ^(scripts|src/scylla|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: mypy-check-python
        name: Mypy Type Check Python
        description: Type check Python files in scripts/, src/scylla/, tests/ using pixi run mypy.
        entry: pixi run mypy scripts/ src/scylla/ tests/
        language: system
        files: ^(scripts|src/scylla|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: check-type-alias-shadowing
        name: Check Type Alias Shadowing
        description: Prevent type aliases that shadow more specific domain names (e.g., Result = DomainResult)
        entry: python scripts/check_type_alias_shadowing.py
        language: system
        files: ^(scripts|src/scylla|tests)/.*\.py$
        exclude: ^tests/test_check_type_alias_shadowing\.py$
        types: [python]
        pass_filenames: true
      - id: validate-model-configs
        name: Validate Model Config Naming
        description: Ensure model config filenames match the model_id and required fields are present
        entry: pixi run python scripts/validate_model_configs.py
        language: system
        files: ^config/models/.*\.yaml$
        pass_filenames: false
      - id: check-model-config-consistency
        name: Check Model Config Filename/model_id Consistency
        description: Fails if any config/models/*.yaml filename does not match its model_id field
        entry: pixi run python scripts/check_model_config_consistency.py
        language: system
        files: ^config/models/.*\.yaml$
        pass_filenames: false
      - id: check-defaults-filename
        name: Check Defaults Config Filename
        description: Fails if config/defaults.yaml is renamed or replaced with a non-standard filename
        entry: pixi run python scripts/check_defaults_filename.py
        language: system
        files: ^config/defaults\.yaml$
        pass_filenames: false
      - id: check-tier-config-consistency
        name: Check Tier Config Filename/tier Consistency
        description: Fails if any config/tiers/*.yaml filename does not match its tier field
        entry: pixi run python scripts/check_tier_config_consistency.py
        language: system
        files: ^config/tiers/.*\.yaml$
        pass_filenames: false
      - id: check-python-version-consistency
        name: Check Python Version Consistency
        description: Fails if pyproject.toml Python classifiers and Dockerfile FROM version differ
        entry: pixi run python scripts/check_python_version_consistency.py
        language: system
        files: ^(pyproject\.toml|docker/Dockerfile)$
        pass_filenames: false
      - id: check-unit-test-structure
        name: Check Unit Test Structure
        description: Fails if any test_*.py file exists directly under tests/unit/ (enforces sub-package mirroring convention)
        entry: pixi run python scripts/check_unit_test_structure.py
        language: system
        files: ^tests/unit/.*\.py$
        pass_filenames: false
      - id: audit-doc-policy
        name: Audit Doc Policy Violations
        description: Fails if any markdown file contains command examples that violate CLAUDE.md policies
        entry: pixi run python scripts/audit_doc_examples.py
        language: system
        files: \.md$
        types: [markdown]
        pass_filenames: false
      - id: check-docstring-fragments
        name: Check Orphaned Docstring Fragments
        description: Detects orphaned lowercase continuation lines in module-level and function docstrings (e.g., lines starting with connector words like 'across', 'and', 'or') and fails the commit
        entry: pixi run hephaestus-check-docstrings --directory src/scylla/
        language: system
        files: \.py$
        types: [python]
        pass_filenames: false
      - id: check-doc-config-consistency
        name: Check Doc/Config Metric Consistency
        description: Fails if coverage threshold in CLAUDE.md or README.md --cov path diverges from pyproject.toml
        entry: pixi run python scripts/check_doc_config_consistency.py
        language: system
        files: ^(CLAUDE\.md|README\.md|pyproject\.toml)$
        pass_filenames: false
      - id: validate-config-schemas
        name: Validate Config Files Against JSON Schemas
        description: >-
          Validates config/defaults.yaml, config/models/*.yaml,
          config/tiers/*.yaml, and tests/fixtures/config/tiers/*.yaml
          against their JSON schemas in schemas/
        entry: pixi run python scripts/validate_config_schemas.py
        language: system
        files: >-
          ^(config/defaults\.yaml|config/models/.+\.yaml|config/tiers/.+\.yaml|
          tests/fixtures/config/tiers/.+\.yaml)$
        pass_filenames: true
      - id: check-tier-label-consistency
        name: Check Tier Label Consistency
        description: >-
          Fails if any markdown file pairs a tier ID (T0–T6) with the wrong
          canonical name (e.g. T3/Tooling instead of T3/Delegation).
        entry: pixi run python scripts/check_tier_label_consistency.py
        language: system
        files: \.md$
        types: [markdown]
        pass_filenames: false
      - id: ruff-check-complexity
        name: Ruff Complexity Check (C901)
        description: Fail if any function exceeds McCabe complexity 12 without a noqa directive
        entry: pixi run ruff check --select C901 scripts/ src/scylla/
        language: system
        files: ^(scripts|src/scylla)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: check-max-complexity
        name: Check Cyclomatic Complexity
        description: Fails if any function in src/scylla/ exceeds max cyclomatic complexity of 10
        entry: pixi run hephaestus-check-complexity --threshold 10 --path src/scylla/
        language: system
        files: ^src/scylla/.*\.py$
        pass_filenames: false
      - id: check-package-version-consistency
        name: Check Package Version Consistency
        description: >-
          Fails if pixi.toml or src/scylla/__init__.py version diverges from
          pyproject.toml. Use --scan-skills to also check skill template files
          for aspirational version references.
        entry: pixi run python scripts/check_package_version_consistency.py --scan-skills
        language: system
        files: >-
          ^(pyproject\.toml|pixi\.toml|src/scylla/__init__\.py|
          \.claude-plugin/skills/.*\.md|\.claude/.*\.md)$
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        # Path excludes live in .markdownlintignore so CI and pre-commit agree.
        args: ['--config', '.markdownlint.yaml', '--fix']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: YAML Lint
        description: Lint YAML files for syntax and style
        args: ['--config-file', '.yamllint.yaml']
        exclude: ^(\.pixi|build)/

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: ShellCheck
        description: Lint shell scripts and templates for best practices
        exclude: ^(build/|docs/arxiv/)
        files: \.(sh|bash|sh\.template)$
        types: [text]
        args: ['--exclude=SC1091']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        exclude: ^notes/(plan|review|issues)/
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: ^notes/(plan|review|issues)/
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=5000']
      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        exclude: ^notes/(plan|review|issues)/
      - id: check-merge-conflict
        name: Check for Merge Conflict Markers

  # Conventional Commits validation (commit-msg stage)
  - repo: local
    hooks:
      - id: conventional-commit-msg
        name: Conventional Commit Message
        description: >-
          Validate that commit subjects follow Conventional Commits
          (feat/fix/docs/...). Documented in CLAUDE.md "Commit Message Format".
        entry: python3 scripts/check_conventional_commit.py
        language: system
        stages: [commit-msg]
