# ProjectScylla Default Configuration
# This file contains default settings for the evaluation framework

# Evaluation settings
evaluation:
  # Number of runs per evaluation
  runs_per_eval: 10
  # Default timeout in seconds
  timeout: 300
  # Random seed for reproducibility (null for random)
  seed: null

# Metrics settings
metrics:
  # Quality metrics to calculate
  quality:
    - pass_rate
    - impl_rate
    - progress_rate
    - consistency
  # Economic metrics to calculate
  economic:
    - cost_of_pass
    - token_distribution
    - change_fail_percentage

# Output settings
output:
  # Directory for run artifacts
  runs_dir: "runs"
  # Directory for summary reports
  summaries_dir: "summaries"
  # Directory for full reports
  reports_dir: "reports"

# Logging settings
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Resilience settings for external service calls
resilience:
  retry:
    max_retries: 3
    initial_delay: 1.0
    backoff_factor: 2
    max_delay: 30.0
    jitter: true
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 60
    half_open_max_calls: 1
  timeouts:
    api_call: 60
    benchmark_run: 300
    analysis: 120
    judge: 1200

# Docker executor settings
docker:
  resource_limits:
    # Memory cap per agent container — prevents a runaway agent from OOM-killing
    # the host. Accepts Docker memory format (e.g. "8g", "4096m").
    memory_limit: "8g"
    # Fractional CPU cores available to each container.
    cpu_limit: 2.0
    # Maximum number of processes (PIDs) inside the container. Guards against
    # fork-bomb style loops.
    pids_limit: 512

# Default model used when no --model flag is provided
default_model: "claude-sonnet-4-6"

# NATS JetStream subscription settings
nats:
  enabled: false
  url: "nats://localhost:4222"
  stream: "TASKS"
  subjects:
    - "hi.tasks.>"
  durable_name: "scylla-subscriber"
