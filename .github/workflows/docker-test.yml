name: Docker Validation

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'src/scylla/**'
      - 'tests/shell/**'
      - '.github/workflows/docker-test.yml'
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'src/scylla/**'
      - 'tests/shell/**'
      - '.github/workflows/docker-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - name: Validate Dockerfile syntax
        run: |
          # Use docker build --check to validate Dockerfile syntax
          # This doesn't actually build the image, just validates syntax
          docker build --check docker/

      - name: Validate docker-compose.yml
        run: |
          # Validate docker-compose.yml configuration
          docker compose -f docker/docker-compose.yml config --quiet

      # Docker integration tests are deferred — see docs/dev/adr/docker-testing-deferred.md
      # Entrypoint script testing is tracked in GitHub issue #1113

  docker-build-timing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - name: Build cold (no cache)
        id: cold_build
        run: |
          START=$SECONDS
          docker build -f docker/Dockerfile -t scylla-experiment:trivy-scan . \
            --progress=plain --no-cache \
            2>&1 | tee /tmp/build_cold.log
          echo "duration=$((SECONDS - START))" >> "$GITHUB_OUTPUT"

      - name: Scan experiment image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          image-ref: scylla-experiment:trivy-scan
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          version: v0.69.3

      - name: Check npm audit (non-blocking)
        id: npm_audit
        run: |
          # Run npm audit inside the built container to check for high/critical vulnerabilities.
          # Non-blocking: findings are reported to the step summary as warnings, the
          # step itself always succeeds because the script captures and inspects the
          # audit exit code instead of letting it propagate.
          AUDIT_OUTPUT=$(docker run --rm scylla-experiment:trivy-scan \
            npm audit --audit-level=high 2>&1) || AUDIT_EXIT=$?
          AUDIT_EXIT=${AUDIT_EXIT:-0}

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            VULN_COUNT=$(printf '%s\n' "$AUDIT_OUTPUT" | awk '/high|critical/{n++} END{print n+0}')
            echo "::warning file=docker/Dockerfile::npm audit found ${VULN_COUNT} high/critical advisory line(s) in scylla-experiment image"
            {
              echo "## npm audit (high/critical)"
              echo ""
              echo '```'
              echo "$AUDIT_OUTPUT"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::npm audit passed — no high/critical vulnerabilities in npm dependencies"
          fi

      - name: Apply trivial source-only change
        run: echo '# timing-probe' >> src/scylla/__init__.py

      - name: Build warm (source-only change, Layer 1+2 should be cached)
        id: warm_build
        run: |
          START=$SECONDS
          docker build -f docker/Dockerfile . --progress=plain \
            2>&1 | tee /tmp/build_warm.log
          echo "duration=$((SECONDS - START))" >> "$GITHUB_OUTPUT"

      - name: Revert source change
        if: always()
        run: git checkout src/scylla/__init__.py

      - name: Install hephaestus
        run: pip install "homericintelligence-hephaestus>=0.7.0,<1"

      - name: Report timing results
        env:
          COLD_DURATION: ${{ steps.cold_build.outputs.duration }}
          WARM_DURATION: ${{ steps.warm_build.outputs.duration }}
        run: |
          python3 - <<'PYEOF'
          import os
          import sys

          sys.path.insert(0, ".")
          from scripts.docker_build_timing import (
              build_summary_table,
              compute_reduction,
              count_cached_layers,
          )

          cold = int(os.environ["COLD_DURATION"])
          warm = int(os.environ["WARM_DURATION"])

          with open("/tmp/build_warm.log") as f:
              warm_log = f.read()

          cached_count = count_cached_layers(warm_log)
          reduction = compute_reduction(cold, warm)
          table = build_summary_table(cold, warm, cached_count, reduction)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              f.write(table)
          print(table)

          if reduction < 30:
              print(
                  f"::warning::Docker source-only rebuild reduced build time by "
                  f"{reduction}% -- below the >=30% target. "
                  "Review layer ordering in docker/Dockerfile."
              )
          else:
              print(
                  f"::notice::Docker source-only rebuild achieved {reduction}% "
                  "reduction -- meets >=30% acceptance criterion."
              )
          PYEOF
