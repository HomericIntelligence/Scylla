name: CI Image

on:
  push:
    branches: [main]
    paths:
      - "ci/Containerfile"
      - "pixi.toml"
      - "pixi.lock"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - ".github/workflows/ci-image.yml"
  pull_request:
    paths:
      - "ci/Containerfile"
      - "pixi.toml"
      - "pixi.lock"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - ".github/workflows/ci-image.yml"
  schedule:
    # Rebuild weekly on Mondays at 06:00 UTC to pick up base image security patches
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/homericintelligence/scylla-ci

jobs:
  build-and-push:
    name: Build, scan, and push CI image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Verify Podman is available
        run: |
          podman --version
          podman info --format '{{.Host.Security.Rootless}}'

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Build CI image
        id: build
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT="${GIT_SHA:0:8}"
          podman build \
            --file ci/Containerfile \
            --layers \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:${SHORT}" \
            --label "org.opencontainers.image.revision=${GIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          echo "short_sha=${SHORT}" >> "$GITHUB_OUTPUT"
          # Save image to tar for Trivy — Trivy cannot access the Podman image store directly
          podman save --output /tmp/scylla-ci.tar "${IMAGE_NAME}:latest"

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          scan-type: image
          input: /tmp/scylla-ci.tar
          scanners: vuln
          trivyignores: .trivyignore
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Check npm audit (non-blocking)
        id: npm_audit
        run: |
          # Run npm audit inside the built CI image to check for high/critical vulnerabilities.
          # Non-blocking: findings are reported to the step summary as warnings, the
          # step itself always succeeds because the script captures and inspects the
          # audit exit code instead of letting it propagate.
          AUDIT_OUTPUT=$(podman run --rm "${IMAGE_NAME}:latest" \
            npm audit --audit-level=high 2>&1) || AUDIT_EXIT=$?
          AUDIT_EXIT=${AUDIT_EXIT:-0}

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            VULN_COUNT=$(printf '%s\n' "$AUDIT_OUTPUT" | awk '/high|critical/{n++} END{print n+0}')
            echo "::warning file=ci/Containerfile::npm audit found ${VULN_COUNT} high/critical advisory line(s) in scylla-ci image"
            {
              echo "## npm audit (high/critical)"
              echo ""
              echo '```'
              echo "$AUDIT_OUTPUT"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::npm audit passed — no high/critical vulnerabilities in npm dependencies"
          fi

      - name: Push CI image to GHCR
        if: github.event_name != 'pull_request'
        env:
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
        run: |
          podman push "${IMAGE_NAME}:latest"
          podman push "${IMAGE_NAME}:${SHORT_SHA}"
          {
            echo "## CI Image Published"
            echo ""
            echo "| Tag | Value |"
            echo "|-----|-------|"
            echo "| \`${IMAGE_NAME}:latest\` | pushed |"
            echo "| \`${IMAGE_NAME}:${SHORT_SHA}\` | pinned SHA |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report PR build status
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## CI Image Build (PR)"
            echo ""
            echo "Image built and scanned successfully — not pushed (PR build only)."
            echo "Push happens on merge to \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"
