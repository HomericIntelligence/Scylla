# Single source of truth for every status check that gates merges on `main`.
#
# The org ruleset `homeric-main-baseline` (NOT classic branch protection)
# requires these EXACT contexts. Each is produced by a job named identically
# below, all in THIS workflow so they share one concurrency group and one run:
#   - lint
#   - unit-tests
#   - integration-tests
#   - security/dependency-scan
#   - security/secrets-scan
#   - build
#   - schema-validation
#   - deps/version-sync
#
# These jobs previously lived in separate workflows (test.yml, pre-commit.yml,
# security.yml) under non-matching names (`test (unit, tests/unit)`,
# `Dependency vulnerability scan`, …), so the required contexts NEVER reported
# and every PR sat permanently BLOCKED. Consolidating here makes the emitted
# check names match the ruleset exactly. A prior attempt to bridge them via
# `workflow_call` failed because the called workflow shared a concurrency group
# and `cancel-in-progress` cancelled one of the two runs — inlining the job
# bodies removes that hazard entirely. Closes #2016.
name: Required Checks

on:
  pull_request:
  push:
    branches: [main]

# One run per branch at a time; cancel any in-progress run when a new commit
# arrives. The group includes ${{ github.workflow }} so it cannot collide with
# any other workflow's concurrency group (the bug that cancelled the old
# workflow_call bridge).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 0. forbid-suppressions ─────────────────────────────────────────────────
  # Regression guard for HomericIntelligence/Odysseus#280: rejects `|| true`
  # and `continue-on-error: true` in shell/YAML/Dockerfile/justfile/HCL files
  # and in GitHub Actions workflows. Refactor to an explicit `if`-guard, a
  # real conditional, or a documented `set +e`/`set -e` bracket.
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above.'
            echo '::error::Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  # ── 1. lint ────────────────────────────────────────────────────────────────
  # Emits the required `lint` context. Body inlined from the former
  # pre-commit.yml (deleted in this change) so it runs exactly once, in this
  # workflow's single concurrency group.
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi
        with:
          environment: lint

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Use lightweight lint environment (skips heavy scientific packages)
          pixi install --environment lint
          pixi --version
          pixi run --environment lint pre-commit run --all-files --show-diff-on-failure

      - name: Enforce complexity limit (C901)
        run: pixi run --environment lint ruff check --select C901 src/scylla/ scripts/

      - name: Run mypy
        run: pixi run --environment lint mypy scripts/ src/scylla/ tests/

      - name: Upload pre-commit diff
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: pre-commit-diffs
          retention-days: 7
          path: |
            .git/pre-commit-*

  # ── 2. unit-tests ──────────────────────────────────────────────────────────
  # Emits the required `unit-tests` context. Split out of the former test.yml
  # matrix (deleted in this change) into a discrete job so the emitted name is
  # `unit-tests`, not `test (unit, tests/unit)`.
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Enforce no new deprecated BaseExecutionInfo usage
        run: |
          count=$(grep -rn "BaseExecutionInfo" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "src/scylla/core/results.py" \
            | grep -v "src/scylla/core/__init__.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseExecutionInfo usage count (excluding definition, re-export, and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseExecutionInfo — remove before merging"
            grep -rn "BaseExecutionInfo" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "src/scylla/core/results.py" \
              | grep -v "src/scylla/core/__init__.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Enforce no new deprecated BaseRunMetrics usage
        run: |
          count=$(grep -rn "BaseRunMetrics" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "src/scylla/core/results.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseRunMetrics usage count (excluding definition and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseRunMetrics — remove before merging"
            grep -rn "BaseRunMetrics" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "src/scylla/core/results.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Enforce tier label consistency in metrics-definitions.md
        run: |
          BAD_PATS="T3.{0,10}Tool|T4.{0,10}Deleg|T5.{0,10}Hier|T2.{0,10}Skill|T2.{0,10}Deleg|T3.{0,10}Hier|T4.{0,10}Hybrid|T1.{0,10}Tool|T0.{0,10}Skill|T1.{0,10}Prompt|T2.{0,10}Prompt|T3.{0,10}Skill|T4.{0,10}Tool|T5.{0,10}Deleg|T6.{0,10}Hier|T6.{0,10}Hybrid|T0.{0,10}Tool|T0.{0,10}Deleg|T5.{0,10}Skill|T6.{0,10}Deleg"
          count=$(grep -En "$BAD_PATS" \
            .claude/shared/metrics-definitions.md | wc -l)
          echo "Bad tier label count: $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count tier label mismatch(es) in metrics-definitions.md"
            grep -En "$BAD_PATS" .claude/shared/metrics-definitions.md
            exit 1
          fi

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check Python version consistency (pyproject.toml vs Dockerfile)
        run: pixi run python scripts/check_python_version_consistency.py

      - name: Check version consistency (pyproject.toml, pixi.toml, src/scylla/__init__.py)
        run: pixi run python scripts/check_version_consistency.py

      # Early gate: fail fast if pixi.lock is out of date before running expensive tests.
      - name: Validate pixi.lock is up-to-date
        run: |
          if ! pixi install --locked 2>/dev/null; then
            echo "::error::pixi.lock is stale — run 'pixi install' locally and commit pixi.lock"
            exit 1
          fi

      - name: Check doc/config consistency
        run: pixi run python scripts/check_doc_config_consistency.py --verbose

      - name: Enforce tests/unit/ structure conventions
        run: pixi run python scripts/check_unit_test_structure.py

      - name: Validate config schemas
        run: pixi run python scripts/validate_config_schemas.py config/defaults.yaml config/models/*.yaml tests/fixtures/config/tiers/*.yaml

      - name: Check cyclomatic complexity
        run: pixi run hephaestus-check-complexity --threshold 10

      - name: Run unit tests
        run: |
          pixi run pip install -e .
          pixi run pytest tests/unit --override-ini="addopts=" -v --strict-markers \
            --cov=src/scylla --cov-report=term-missing --cov-report=xml --cov-fail-under=75 \
            --junitxml=junit-unit.xml

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-unit
          path: |
            coverage.xml
            junit-unit.xml
          retention-days: 7

  # ── 3. integration-tests ───────────────────────────────────────────────────
  # Emits the required `integration-tests` context. Split out of the former
  # test.yml matrix so the emitted name is `integration-tests`, not
  # `test (integration, tests/integration)`.
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Enforce no new deprecated BaseExecutionInfo usage
        run: |
          count=$(grep -rn "BaseExecutionInfo" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "src/scylla/core/results.py" \
            | grep -v "src/scylla/core/__init__.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseExecutionInfo usage count (excluding definition, re-export, and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseExecutionInfo — remove before merging"
            grep -rn "BaseExecutionInfo" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "src/scylla/core/results.py" \
              | grep -v "src/scylla/core/__init__.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Enforce no new deprecated BaseRunMetrics usage
        run: |
          count=$(grep -rn "BaseRunMetrics" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "src/scylla/core/results.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseRunMetrics usage count (excluding definition and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseRunMetrics — remove before merging"
            grep -rn "BaseRunMetrics" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "src/scylla/core/results.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Install nats-server
        run: |
          NATS_VERSION="v2.10.24"
          NATS_SHA256="ee6500f364e3a741b496ae0296c04f2a9d53bbaabac457104ac74596b4a59d85"
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/nats-server-${NATS_VERSION}-linux-amd64.tar.gz" -o nats-server.tar.gz
          echo "${NATS_SHA256}  nats-server.tar.gz" | sha256sum --check
          tar xz -f nats-server.tar.gz
          sudo mv nats-server-${NATS_VERSION}-linux-amd64/nats-server /usr/local/bin/
          rm nats-server.tar.gz
          nats-server --version

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check Python version consistency (pyproject.toml vs Dockerfile)
        run: pixi run python scripts/check_python_version_consistency.py

      - name: Check version consistency (pyproject.toml, pixi.toml, src/scylla/__init__.py)
        run: pixi run python scripts/check_version_consistency.py

      - name: Validate pixi.lock is up-to-date
        run: |
          if ! pixi install --locked 2>/dev/null; then
            echo "::error::pixi.lock is stale — run 'pixi install' locally and commit pixi.lock"
            exit 1
          fi

      - name: Run integration tests
        run: |
          # Integration tests: 5% floor prevents regression without blocking new work
          # --reruns 2: retry flaky integration tests (network/API calls) up to 2 times
          pixi run pytest tests/integration -v \
            --cov=src/scylla --cov-report=term-missing --cov-report=xml --cov-fail-under=5 \
            --reruns 2 --reruns-delay 5 \
            --junitxml=junit-integration.xml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-integration
          path: |
            coverage.xml
            junit-integration.xml
          retention-days: 7

  # ── 4. security/dependency-scan ────────────────────────────────────────────
  # Emits the required `security/dependency-scan` context. Body inlined from the
  # former security.yml `pip-audit` job (renamed from "Dependency vulnerability
  # scan"). The weekly scheduled scan stays in security.yml (schedule-only).
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi
        with:
          environment: lint

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 5. security/secrets-scan ───────────────────────────────────────────────
  # Emits the required `security/secrets-scan` context. Body inlined from the
  # former security.yml `secrets-scan` job (renamed from "Secrets scan
  # (gitleaks)").
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history checkout so gitleaks can scan all commits, not just HEAD.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  # ── 6. build ───────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Validate Dockerfile syntax
        run: |
          # Validate all Dockerfiles in the repo using docker build --check (BuildKit dry-run)
          find . -name "Dockerfile*" \
            -not -path "./.pixi/*" \
            -not -path "./docker/*" \
            | sort | while read -r df; do
              echo "Checking $df ..."
              docker build --check -f "$df" . || exit 1
            done
          # Also check docker/ subdirectory Dockerfiles independently
          find ./docker -name "Dockerfile*" 2>/dev/null | sort | while read -r df; do
            echo "Checking $df ..."
            docker build --check -f "$df" ./docker || exit 1
          done

      - name: Install build backend dependencies
        run: |
          # --no-isolation skips the isolated venv, so the build backend must be
          # present in the active environment.  Install both the 'build' frontend
          # and hatchling (declared in pyproject.toml [build-system].requires).
          pixi run pip install build "hatchling>=1.29.0,<2"

      - name: Build Python package (sdist + wheel)
        run: |
          pixi run python -m build --no-isolation
          ls -lh dist/

  # ── 7. schema-validation ───────────────────────────────────────────────────
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi
        with:
          environment: lint

      - name: Validate workflow YAML schemas
        run: |
          pixi run --environment lint pip install check-jsonschema
          find .github/workflows -name "*.yml" | sort | \
            xargs pixi run --environment lint check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow

      - name: Validate JSON schemas in schemas/
        run: |
          # Ensure every schema file in schemas/ is valid JSON
          find schemas/ -name "*.json" 2>/dev/null | sort | while read -r f; do
            echo "Checking $f ..."
            python3 -c "import json, sys; json.load(open('$f'))" || exit 1
          done

  # ── 8. deps/version-sync ───────────────────────────────────────────────────
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check version consistency (pyproject.toml, pixi.toml, __init__.py)
        run: pixi run python scripts/check_version_consistency.py

      - name: Cross-check pyproject.toml and pixi.toml versions
        run: |
          pixi run python3 - <<'EOF'
          import tomllib, sys

          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          with open("pixi.toml", "rb") as f:
              pixi = tomllib.load(f)

          pyproject_ver = pyproject.get("project", {}).get("version") or \
                          pyproject.get("tool", {}).get("poetry", {}).get("version")
          pixi_ver = pixi.get("workspace", {}).get("version") or pixi.get("package", {}).get("version")

          print(f"pyproject.toml version : {pyproject_ver}")
          print(f"pixi.toml version      : {pixi_ver}")

          if pyproject_ver and pixi_ver and pyproject_ver != pixi_ver:
              print(f"::error::Version mismatch: pyproject.toml={pyproject_ver}, pixi.toml={pixi_ver}")
              sys.exit(1)
          print("Versions are consistent.")
          EOF

      - name: Validate pixi.lock is up-to-date
        run: |
          if ! pixi install --locked 2>/dev/null; then
            echo "::error::pixi.lock is stale — run 'pixi install' locally and commit pixi.lock"
            exit 1
          fi

  # ── 9. markdownlint ────────────────────────────────────────────────────────
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v20.0.0
        # Globs and rule config come from .markdownlint-cli2.yaml at repo root,
        # which is the same file pre-commit reads — keeps CI and local in sync.
        with:
          globs: "**/*.md"

  # ── 10. pixi-check ─────────────────────────────────────────────────────────
  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  # ── 11. justfile-check ─────────────────────────────────────────────────────
  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  # ── 12. symlink-check ──────────────────────────────────────────────────────
  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh
