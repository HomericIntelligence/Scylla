name: Security (scheduled)

# Scheduled-only security sweep. The PR-gating security contexts
# (`security/dependency-scan`, `security/secrets-scan`) are produced by
# _required.yml on every pull_request; this workflow runs the same scans on a
# weekly cron (and on demand) to catch newly-disclosed advisories against
# already-merged `main`. It deliberately has NO pull_request / push /
# workflow_call trigger so it cannot emit competing PR check contexts or
# collide with _required.yml's concurrency group.
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install locked project environment
        run: uv sync --all-groups --all-extras --locked

      - name: Run pip-audit
        id: pip-audit
        run: uv run pip-audit --format json | uv run python scripts/filter_audit.py

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Full history checkout so gitleaks can scan all commits, not just HEAD.
      # Without fetch-depth: 0, gitleaks only sees the working directory.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose
