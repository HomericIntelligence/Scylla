name: Release

on:
  workflow_dispatch:
    inputs:
      part:
        type: choice
        description: "Version part to bump (patch, minor, major)"
        required: true
        options:
          - patch
          - minor
          - major
      testpypi:
        type: boolean
        description: "Dry-run: publish to TestPyPI instead of PyPI"
        required: false
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Bump version (${{ github.event.inputs.part }})
        run: pixi run python scripts/bump_version.py "${{ github.event.inputs.part }}"

      - name: Commit version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pixi.toml
          git commit -m "chore(release): bump version (${{ github.event.inputs.part }})"

      - name: Create git tag
        run: |
          VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          git tag "v${VERSION}"
          echo "VERSION=v${VERSION}" >> "$GITHUB_ENV"

      - name: Push release branch and tag
        run: |
          git push origin "HEAD:release/version-bump-${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"

      - name: Open PR for version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore(release): bump version to ${{ env.VERSION }}" \
            --body "Automated version bump to ${{ env.VERSION }} (${{ github.event.inputs.part }} release).

          Triggered by @${{ github.actor }} via workflow_dispatch." \
            --base main \
            --head "release/version-bump-${{ env.VERSION }}"
          gh pr merge --auto --rebase

      - name: Version bump complete
        run: |
          echo "Successfully bumped version to: ${{ env.VERSION }}"
          echo "Tag created and pushed: ${{ env.VERSION }}"
          echo "PR opened for version bump branch: release/version-bump-${{ env.VERSION }}"

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 0

      - name: Validate tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes

  # ---------------------------------------------------------------------------
  # Build distribution artifacts (sdist + wheel)
  # Runs on every tag push so artifacts are available for both PyPI and TestPyPI.
  # ---------------------------------------------------------------------------
  build:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.10"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC — no API token required).
  # Triggered only on tag push (v*).  A maintainer must configure the PyPI
  # Trusted Publisher once; see docs/dev/release.md for setup instructions.
  # ---------------------------------------------------------------------------
  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/scylla
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # release/v1

  # ---------------------------------------------------------------------------
  # TestPyPI dry-run — only on workflow_dispatch with testpypi=true.
  # Lets maintainers smoke-test the publish pipeline before cutting a real tag.
  # ---------------------------------------------------------------------------
  publish-testpypi:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.testpypi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: testpypi
      url: https://test.pypi.org/p/scylla
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # Required for OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.10"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
