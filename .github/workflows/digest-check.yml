name: Check Node Digest Pins

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-node-digest:
    name: Check for stale node digest pins
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Get current pinned digest from Containerfile
        id: pinned
        run: |
          PINNED_DIGEST=$(grep -oP 'FROM python:3.12-slim@sha256:\K[a-f0-9]{64}' ci/Containerfile | head -1)
          echo "digest=${PINNED_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pinned digest: ${PINNED_DIGEST}"

      - name: Get latest digest from Docker Hub
        id: latest
        run: |
          LATEST_DIGEST=$(curl -s -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            https://registry-1.docker.io/v2/library/python/manifests/3.12-slim \
            | jq -r '.config.digest' 2>/dev/null || echo "")

          if [ -z "$LATEST_DIGEST" ]; then
            LATEST_DIGEST=$(curl -s -I -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              https://registry-1.docker.io/v2/library/python/manifests/3.12-slim \
              | grep -i "docker-content-digest" | awk '{print $2}' | tr -d '[:space:]' | sed 's/sha256://')
          fi

          echo "digest=${LATEST_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Latest digest: ${LATEST_DIGEST}"

      - name: Compare digests
        id: compare
        run: |
          PINNED="${{ steps.pinned.outputs.digest }}"
          LATEST="${{ steps.latest.outputs.digest }}"

          if [ -z "$PINNED" ]; then
            echo "ERROR: Could not extract pinned digest from Containerfile"
            exit 1
          fi

          if [ -z "$LATEST" ]; then
            echo "ERROR: Could not fetch latest digest from Docker Hub"
            exit 1
          fi

          if [ "$PINNED" = "$LATEST" ]; then
            echo "status=current" >> "$GITHUB_OUTPUT"
            echo "Digest is up to date"
          else
            echo "status=stale" >> "$GITHUB_OUTPUT"
            echo "Digest is stale"
          fi

      - name: Open issue if digest is stale
        if: steps.compare.outputs.status == 'stale'
        run: |
          LATEST_DIGEST="${{ steps.latest.outputs.digest }}"
          EXISTING_ISSUE=$(gh issue list --search "update python:3.12-slim digest in:title" --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Updating existing issue #${EXISTING_ISSUE}"
            gh issue comment "${EXISTING_ISSUE}" --body "Digest check: Latest digest is ${LATEST_DIGEST}"
          else
            echo "Creating new issue for digest update"
            gh issue create --title "chore: update python:3.12-slim digest pins" --body "The python:3.12-slim digest pins need to be updated. Latest: ${LATEST_DIGEST}. Check ci/Containerfile and docker/Dockerfile."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report status
        run: |
          if [ "${{ steps.compare.outputs.status }}" = "current" ]; then
            echo "All digest pins are current"
          else
            echo "Digest pins are stale - issue opened or updated"
          fi
