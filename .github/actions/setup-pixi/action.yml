name: Set Up Pixi Environment
description: Install pixi and cache pixi environments. Wraps prefix-dev/setup-pixi with rattler cache.

inputs:
  environment:
    description: 'Pixi environment to install (e.g. default, lint)'
    required: false
    default: 'default'

runs:
  using: composite
  steps:
    - name: Install pixi
      # IMPORTANT: pixi-version must be kept in sync with:
      #   - .github/workflows/_required.yml (pixi-check job, pixi-version field)
      #   - ci/Containerfile (PIXI_VERSION ARG)
      # When bumping, update ALL THREE locations together.
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
      with:
        pixi-version: v0.67.2
        environments: ${{ inputs.environment }}

    - name: Cache pixi environments
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
      with:
        path: |
          .pixi
          ~/.cache/rattler/cache
        key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
        restore-keys: |
          pixi-${{ runner.os }}-
