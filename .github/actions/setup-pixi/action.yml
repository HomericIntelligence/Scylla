name: Set Up Pixi Environment
description: Install pixi and cache pixi environments. Wraps prefix-dev/setup-pixi with rattler cache.

inputs:
  environment:
    description: 'Pixi environment to install (e.g. default, lint)'
    required: false
    default: 'default'

runs:
  using: composite
  steps:
    - name: Read canonical pixi version
      id: read-version
      shell: bash
      run: echo "version=$(tr -d '[:space:]' < .github/pixi-version)" >> "$GITHUB_OUTPUT"

    - name: Install pixi
      uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
      with:
        pixi-version: ${{ steps.read-version.outputs.version }}
        environments: ${{ inputs.environment }}

    - name: Cache pixi environments
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
      with:
        path: |
          .pixi
          ~/.cache/rattler/cache
        key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
        restore-keys: |
          pixi-${{ runner.os }}-
