[workspace]
name = "scylla"
version = "0.1.0"
description = "AI agent testing and optimization framework"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
test = "pytest"
test-unit = "pytest tests/unit --override-ini='addopts=' -v --strict-markers --cov=src/scylla --cov-report=term-missing --cov-fail-under=75"
test-shell = "bats tests/shell/ --recursive --timing"
lint = "ruff check src/scylla scripts tests"
format = "ruff format src/scylla scripts tests"
plan-issues = "python scripts/plan_issues.py"
audit = "pixi run --environment lint pip-audit"
# CI container tasks (requires podman or docker)
ci-build = "podman build -f ci/Containerfile -t scylla-ci:local . || docker build -f ci/Containerfile -t scylla-ci:local ."
ci-lint = "./scripts/run_ci_local.sh pre-commit"
ci-test = "./scripts/run_ci_local.sh test"
ci-all = "./scripts/run_ci_local.sh all"

[dependencies]
python = ">=3.10"
pip = ">=24.0,<26"
pre-commit = ">=4.6.0,<5"
pytest = ">=9.0.2,<10"
pytest-cov = ">=7.0.0,<8"
pytest-timeout = ">=2.0,<3"
pytest-rerunfailures = ">=14.0,<15"
types-pyyaml = ">=6.0.12.20250915,<7"
types-jsonschema = ">=4.26.0.20260202,<5"

[pypi-dependencies]
scylla = { path = ".", editable = true }
homericintelligence-hephaestus = ">=0.7.0,<1"
matplotlib = ">=3.10.9,<4"
numpy = ">=1.24,<3"
pandas = ">=2.3.3,<3"
seaborn = ">=0.13.2,<1"
scipy = ">=1.15.3,<2"
altair = ">=6.1.0,<7"
vl-convert-python = ">=1.9.0.post1,<2"
krippendorff = ">=0.8.2,<1"
statsmodels = ">=0.14,<1"
jsonschema = ">=4.0,<5"
defusedxml = ">=0.7,<1"
nats-py = ">=2.0,<3"
httpx = ">=0.28.1,<1"
pytest-asyncio = ">=1.3.0,<2"

[feature.dev.dependencies]
just = ">=1.25.0,<2"
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
yamllint = ">=1.35.0,<2"
bats-core = ">=1.11.0,<2"

[feature.dev.pypi-dependencies]
pip-audit = ">=2.7,<3"
bump2version = ">=1.0.1,<2"
import-linter = ">=2.0,<3"

[feature.lint.dependencies]
# Minimal dependencies for CI pre-commit checks only
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
yamllint = ">=1.35.0,<2"
pre-commit = ">=4.6.0,<5"

[feature.lint.pypi-dependencies]
pip-audit = ">=2.7,<3"
bandit = { version = ">=1.7.5,<2", extras = ["toml"] }
import-linter = ">=2.0,<3"

[feature.lint.tasks]
pip-audit = "pip-audit --format json | python scripts/filter_audit.py"
lint-imports = "lint-imports --config pyproject.toml"

[feature.docs.target.linux-64.dependencies]
tectonic = ">=0.15,<1"

[feature.docs.target.osx-arm64.dependencies]
tectonic = ">=0.15,<1"

[feature.docs.target.osx-64.dependencies]
tectonic = ">=0.15,<1"

[feature.docs.tasks]
paper-build = { cmd = "bash docs/arxiv/haiku/build.sh", description = "Build the arXiv paper PDF" }

[environments]
default = { features = ["dev"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
docs = { features = ["dev", "docs"], solve-group = "default" }
